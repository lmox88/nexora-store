{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h2>Login</h2>
    {% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
    {% endif %}
    <form method="post">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username">

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password">

        <button class="btn-soft btn-primary-soft">
            Login
        </button>

    </form>

</div>

{% endblock %}
