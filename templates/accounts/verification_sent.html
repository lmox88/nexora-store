{% extends 'base.html' %}

{% block content %}

<div class="container text-center py-5">

    <h2>📧 Verification Email Sent</h2>

    <p>
        We have sent a verification link to:
        <strong>{{ email }}</strong>
    </p>

    <p>Please check your inbox and click the link to activate your account.</p>

    <a href="{% url 'login' %}" class="btn-soft btn-primary-soft mt-3">
        Go to Login
    </a>

    <div class="mt-5 p-3 border" style="background-color: #f8f9fa;">
        <p class="text-muted small">
            <em>Testing/Reviewer Link:</em><br>
            <a href="{{ link_for_testing }}" target="_blank">{{ link_for_testing }}</a>
        </p>
    </div>

</div>

{% endblock %}
