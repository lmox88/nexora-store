{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h2>Checkout</h2>

    <div class="card-ui mt-4">

        {% for item in items %}

            <div class="d-flex justify-content-between mb-3">

                <div>
                    {{ item.product.name }}
                    × {{ item.qty }}
                </div>

                <div>
                    {{ item.subtotal }} SAR
                </div>

            </div>

        {% endfor %}

        <hr>

        <h4>Total: {{ total }} SAR</h4>

        <button class="btn-soft btn-primary-soft mt-3">
            <a href="{% url 'create_checkout_session' %}"
   class="btn-soft btn-primary-soft">
    Pay with Stripe
</a>
        </button>

    </div>

</div>

{% endblock %}
