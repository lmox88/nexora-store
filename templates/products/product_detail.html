{% extends 'base.html' %}
{% block content %}

<div class="container py-5">

    <div class="row">

        <!-- MAIN IMAGE -->
        <div class="col-md-6">

            {% if product.images.all %}
                <img id="mainImage"
                     src="{{ product.images.first.image.url }}"
                     class="img-fluid rounded shadow-sm mb-3"
                     style="width:100%; height:400px; object-fit:cover;">
            {% endif %}

            <!-- THUMBNAILS -->
            <div class="d-flex gap-2">

                {% for img in product.images.all %}

                    <img src="{{ img.image.url }}"
                         onclick="document.getElementById('mainImage').src='{{ img.image.url }}'"
                         style="width:70px; height:70px; object-fit:cover; cursor:pointer; border-radius:8px;"
                         class="border">

                {% endfor %}

            </div>

        </div>

        <!-- INFO -->
        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h4 class="mt-2">{{ product.price }} SAR</h4>

            <p class="text-muted mt-3">
                {{ product.description }}
            </p>

            <a href="{% url 'add_to_cart' product.id %}"
               class="btn btn-dark w-100 mt-3">
                Add to Cart
            </a>

            <a href="{% url 'product_list' %}"
               class="btn btn-outline-dark w-100 mt-2">
                Back to Products
            </a>

        </div>

    </div>

</div>

{% endblock %}
